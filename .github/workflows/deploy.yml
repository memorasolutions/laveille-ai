name: Deploy to cPanel via rsync/SSH

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H server.memora.pro >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -azP \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='vendor/' \
            --exclude='node_modules/' \
            --exclude='storage/' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='public/screenshots/' \
            --exclude='public/build/' \
            --exclude='bootstrap/cache/' \
            --exclude='tests/' \
            --exclude='_*.php' \
            --exclude='*.log' \
            --exclude='error_log' \
            ./ gmemora@server.memora.pro:/home/gmemora/public_html/apps_diverses/laveille.ai/

      - name: Clear caches on server
        run: |
          ssh gmemora@server.memora.pro "cd /home/gmemora/public_html/apps_diverses/laveille.ai && php artisan view:clear && php artisan responsecache:clear" || true

      - name: Deploy notification
        run: |
          echo "::notice::Deploy rsync/SSH termine avec succes vers server.memora.pro"
          echo "Deploye le $(date -u '+%Y-%m-%d %H:%M:%S UTC') depuis le commit ${{ github.sha }}"
