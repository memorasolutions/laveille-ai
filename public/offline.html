<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            color: #e2e8f0;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 480px; }
        .icon {
            width: 80px; height: 80px; margin: 0 auto 24px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.2);
            display: flex; align-items: center; justify-content: center;
        }
        .icon svg { width: 40px; height: 40px; fill: #818cf8; }
        h1 { font-size: 1.5rem; margin-bottom: 12px; color: #f1f5f9; }
        p { font-size: 1rem; color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            display: inline-block; padding: 12px 32px;
            background: #6366f1; color: #fff; border: none;
            border-radius: 8px; font-size: 1rem; cursor: pointer;
            text-decoration: none; transition: background 0.2s;
        }
        .btn:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01" stroke="#818cf8" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </div>
        <h1>Hors connexion</h1>
        <p>Vous n'avez pas de connexion internet. Vérifiez votre connexion et réessayez.</p>
        <button class="btn" onclick="window.location.reload()">Réessayer</button>
    </div>
</body>
</html>
